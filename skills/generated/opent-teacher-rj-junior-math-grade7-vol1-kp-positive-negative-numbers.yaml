teaching_plan:
  learning_objectives:
  - 理解正负数可以表示相反意义的量
  - 能把生活情境转化为带符号的数
  prerequisites:
  - 小学整数、小数和生活数量经验
  opening:
  - 从温度、海拔、收入支出等相反意义的量导入
  diagnosis_questions:
  - 如果收入 10 元记作 +10，支出 6 元可以怎样记？
  - 0 一定表示没有吗？请举一个情境说明。
  misconceptions:
  - 认为负数一定表示“不存在”
  - 把 0 当成正数或负数
  correction_strategies:
  - 先回到具体情境，再抽象成符号
  - 比较“方向”和“数量大小”两个维度
  practice_sequence:
  - 情境读数
  - 符号表示
  - 反向解释
  mastery_checks:
  - 学生能自己说出符号背后的相反意义
  worked_examples:
  - prompt: 收入 10 元记作 +10，支出 6 元怎样记？
    steps:
    - 先判断收入和支出是一组相反意义的量
    - 已经规定收入用正号表示
    - 支出就用相反的负号表示为 -6
    teacher_note: 不急着报答案，先让学生说出“相反意义”再写符号。
  variant_problems:
  - 海平面以上 30 米记作 +30 米，海平面以下 12 米怎样记？
  - 气温升高 4 摄氏度记作 +4 摄氏度，下降 7 摄氏度怎样记？
  error_contrasts:
  - wrong: 支出 6 元写作 +6，因为 6 是正数。
    why_wrong: 这里的符号表示方向，不是只看数字 6 本身。
    correct: 收入规定为正时，支出作为相反意义的量应写作 -6。
  lesson_summary:
  - 正负号先表示相反方向，再和数量大小组合成带符号的数
  - 0 在不同情境中可能表示基准、分界或没有变化
