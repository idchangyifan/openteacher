  worked_examples:
  - prompt: 计算 (-3)+(+5)，再把 4-(-2) 改写成加法。
    steps:
    - (-3)+(+5) 是异号相加，先比较绝对值 5 和 3
    - 绝对值较大的数是 +5，所以结果为正，大小为 5-3=2
    - 4-(-2) 改写为 4+(+2)
    teacher_note: 每一步都要求学生先说符号来源，再做绝对值运算。
  variant_problems:
  - 计算 (-7)+(+2)，并说明结果符号
  - 把 -3-(+5) 改写成加法再计算
  error_contrasts:
  - wrong: 4-(-2)=4-2=2。
    why_wrong: 减去一个负数要转化为加上它的相反数。
    correct: 4-(-2)=4+(+2)=6。
  lesson_summary:
  - 有理数加法先分同号或异号，再处理绝对值
  - 有理数减法统一转化为加上相反数
