        content_type: concept_summary
        text: 科学记数法把大数写成 a × 10^n，其中 a 的范围通常是 1≤a<10。
      - id: rag-ch1-kp-approximation-method
        content_type: teacher_method
        text: 教近似数时应要求学生说清“精确到哪一位”，而不只给四舍五入结果。
