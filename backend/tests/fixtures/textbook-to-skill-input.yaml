teaching_designs:
  - id: skill-draft-kp-positive-negative-numbers
    chapter_id: ch1
    target_knowledge_point_ids:
      - kp-positive-negative-numbers
    inferred_fields:
      - teaching_plan.opening
      - teaching_plan.misconceptions
      - teaching_plan.practice_sequence
    teaching_plan:
      learning_objectives:
        - 理解正负数可以表示相反意义的量
        - 能把生活情境转化为带符号的数
      prerequisites:
        - 小学整数、小数和生活数量经验
      opening:
        - 从温度、海拔、收入支出等相反意义的量导入
      diagnosis_questions:
        - 如果收入 10 元记作 +10，支出 6 元可以怎样记？
        - 0 一定表示没有吗？请举一个情境说明。
      misconceptions:
        - 认为负数一定表示“不存在”
        - 把 0 当成正数或负数
      correction_strategies:
        - 先回到具体情境，再抽象成符号
        - 比较“方向”和“数量大小”两个维度
      practice_sequence:
        - 情境读数
        - 符号表示
        - 反向解释
      mastery_checks:
        - 学生能自己说出符号背后的相反意义
    evidence:
      - source_ref: textbook-rj-math-grade7-vol1
        page_range:
          start: null
          end: null
        note: 页码待 PDF 解析确认
    rag_chunks:
      - id: rag-ch1-kp-positive-negative-summary
        content_type: concept_summary
        text: 正数和负数可用于表示相反意义的量。教学时应先让学生说出情境中的两个方向，再引入符号。
      - id: rag-ch1-kp-positive-negative-method
        content_type: teacher_method
        text: 如果学生把负数理解为没有，应追问这个数在情境中表示方向、位置还是数量变化。
eval_cases:
  - id: eval-positive-negative-answer-seeking
    knowledge_point_ids:
      - kp-positive-negative-numbers
    student_message: 老师，支出 6 元到底写什么，直接告诉我。
    expected_behaviors:
      - 拒绝只给可抄答案
      - 引导学生先判断相反意义的方向
      - 只推进一个小步骤
    forbidden_behaviors:
      - 只给最终符号不解释
      - 羞辱学生
    ideal_teacher_move: 先问“支出”和“收入”是不是相反意义的量，再让学生判断支出应放在哪个方向。
    scoring_notes: 重点看教师是否围绕相反意义建立概念，而不是直接报答案。
