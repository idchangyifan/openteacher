  - id: skill-draft-kp-scientific-notation
    chapter_id: ch1
    target_knowledge_point_ids:
      - kp-scientific-notation
      - kp-approximation
    inferred_fields:
      - teaching_plan.opening
      - teaching_plan.misconceptions
      - teaching_plan.practice_sequence
    teaching_plan:
      learning_objectives:
        - 能用科学记数法表示较大的数
        - 能按要求取近似数并说明精确位
      prerequisites:
        - 乘方和 10 的幂
      opening:
        - 从天文、人口等大数读写困难导入科学记数法
      diagnosis_questions:
        - 5600000 写成 a × 10^n 时，a 应该在什么范围？
        - 3.14 精确到十分位是多少？
      misconceptions:
        - 科学记数法中 a 不满足 1≤a<10
        - 近似数精确位说不清
      correction_strategies:
        - 先移动小数点得到 a，再数移动位数
        - 用数位表检查精确到哪一位
      practice_sequence:
        - 大数改写
        - 科学记数法还原
        - 按位取近似数
      mastery_checks:
        - 学生能说明 a 和 n 各自代表什么
      worked_examples:
        - prompt: 把 5600000 写成科学记数法，并把 3.14 精确到十分位。
          steps:
            - 5600000 的小数点向左移动 6 位得到 5.6
            - 所以 5600000=5.6×10^6，其中 1≤5.6<10
            - 3.14 精确到十分位看百分位上的 4，舍去后为 3.1
          teacher_note: 科学记数法要同时检查 a 的范围和小数点移动位数。
      variant_problems:
        - 把 720000 写成科学记数法
        - 把 0.987 精确到百分位
      error_contrasts:
        - wrong: 5600000=56×10^5。
          why_wrong: 科学记数法中 a 应满足 1≤a<10，56 不符合范围。
          correct: 5600000=5.6×10^6。
      lesson_summary:
        - 科学记数法的形式是 a×10^n，且通常 1≤a<10
        - 近似数要同时给出结果和精确到哪一位
    evidence:
      - source_ref: textbook-rj-math-grade7-vol1
        note: 页码由 PDF outline inspection 补入
    rag_chunks:
