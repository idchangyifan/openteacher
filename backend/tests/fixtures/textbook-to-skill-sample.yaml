      - teaching_plan.misconceptions
      - teaching_plan.practice_sequence
    teaching_plan:
      learning_objectives:
        - 理解正负数可以表示相反意义的量
        - 能把生活情境转化为带符号的数
      prerequisites:
        - 小学整数、小数和生活数量经验
      opening:
        - 从温度、海拔、收入支出等相反意义的量导入
      diagnosis_questions:
        - 如果收入 10 元记作 +10，支出 6 元可以怎样记？
        - 0 一定表示没有吗？请举一个情境说明。
      misconceptions:
        - 认为负数一定表示“不存在”
        - 把 0 当成正数或负数
      correction_strategies:
        - 先回到具体情境，再抽象成符号
        - 比较“方向”和“数量大小”两个维度
      practice_sequence:
        - 情境读数
        - 符号表示
        - 反向解释
      mastery_checks:
        - 学生能自己说出符号背后的相反意义
