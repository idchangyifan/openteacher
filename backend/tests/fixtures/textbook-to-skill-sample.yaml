    diagnosis_questions:
    - (-2)^3 表示几个 -2 相乘？
    - -2^2 和 (-2)^2 有什么不同？
    misconceptions:
    - 混淆 -2^2 与 (-2)^2
    - 只看指数奇偶，不先确认底数
    correction_strategies:
    - 先圈出底数，再展开成乘法
    - 用负因数个数判断符号
    practice_sequence:
    - 识别底数和指数
    - 展开乘方
    - 计算负数乘方
    mastery_checks:
    - 学生能解释括号对底数的影响
    worked_examples:
    - prompt: 比较 -2^2 和 (-2)^2。
      steps:
      - -2^2 的底数是 2，先算 2^2，再取相反数
      - (-2)^2 的底数是 -2，表示两个 -2 相乘
      - 所以 -2^2=-4，而 (-2)^2=4
      teacher_note: 先圈底数，再展开乘法，避免只背奇偶规则。
    variant_problems:
    - 展开并计算 (-3)^2
    - 判断 -1^4 和 (-1)^4 是否相等
    error_contrasts:
    - wrong: -2^2=4，因为负数的偶次方是正数。
      why_wrong: 这里没有括号，底数不是 -2。
      correct: -2^2 表示 -(2^2)，结果是 -4；(-2)^2 才是 4。
    lesson_summary:
    - 乘方是相同因数连乘的简写
    - 处理负数乘方时必须先确认底数是否包含负号
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
