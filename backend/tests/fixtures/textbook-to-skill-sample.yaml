skill_drafts:
- id: skill-draft-kp-positive-negative-numbers
  target_knowledge_point_ids:
  - kp-positive-negative-numbers
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 理解正负数可以表示相反意义的量
    - 能把生活情境转化为带符号的数
    prerequisites:
    - 小学整数、小数和生活数量经验
    opening:
    - 从温度、海拔、收入支出等相反意义的量导入
    diagnosis_questions:
    - 如果收入 10 元记作 +10，支出 6 元可以怎样记？
    - 0 一定表示没有吗？请举一个情境说明。
    misconceptions:
    - 认为负数一定表示“不存在”
    - 把 0 当成正数或负数
    correction_strategies:
    - 先回到具体情境，再抽象成符号
    - 比较“方向”和“数量大小”两个维度
    practice_sequence:
    - 情境读数
    - 符号表示
    - 反向解释
    mastery_checks:
    - 学生能自己说出符号背后的相反意义
    worked_examples:
    - prompt: 收入 10 元记作 +10，支出 6 元怎样记？
      steps:
      - 先判断收入和支出是一组相反意义的量
      - 已经规定收入用正号表示
      - 支出就用相反的负号表示为 -6
      teacher_note: 不急着报答案，先让学生说出“相反意义”再写符号。
    variant_problems:
    - 海平面以上 30 米记作 +30 米，海平面以下 12 米怎样记？
    - 气温升高 4 摄氏度记作 +4 摄氏度，下降 7 摄氏度怎样记？
    error_contrasts:
    - wrong: 支出 6 元写作 +6，因为 6 是正数。
      why_wrong: 这里的符号表示方向，不是只看数字 6 本身。
      correct: 收入规定为正时，支出作为相反意义的量应写作 -6。
    lesson_summary:
    - 正负号先表示相反方向，再和数量大小组合成带符号的数
    - 0 在不同情境中可能表示基准、分界或没有变化
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    page_range:
      start: 6
      end: 7
    note: 页码待 PDF 解析确认
- id: skill-draft-kp-number-line
  target_knowledge_point_ids:
  - kp-number-line
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 理解数轴用点表示有理数
    - 掌握原点、正方向和单位长度三要素
    prerequisites:
    - 正数、负数和 0 的意义
    opening:
    - 从温度计或直线路标导入，把位置和数联系起来
    diagnosis_questions:
    - 如果 0 在中间，+3 和 -3 应该分别在原点哪一边？
    - 单位长度变了，点表示的数会怎样变化？
    misconceptions:
    - 只画直线不标原点或单位长度
    - 认为负数越靠左数值越大
    correction_strategies:
    - 先补齐三要素，再定位点
    - 用“离原点几个单位、向哪边”描述位置
    practice_sequence:
    - 识别数轴三要素
    - 在数轴上标点
    - 根据点读数
    mastery_checks:
    - 学生能解释一个点为什么表示某个有理数
    worked_examples:
    - prompt: 在数轴上表示 -2 和 +3。
      steps:
      - 先画出原点、正方向和单位长度
      - 从原点向左数 2 个单位得到 -2
      - 从原点向右数 3 个单位得到 +3
      teacher_note: 学生定位前必须先检查数轴三要素是否齐全。
    variant_problems:
    - 读出数轴上原点左侧 4 个单位的点表示的数
    - 在同一数轴上标出 -1.5、0、2
    error_contrasts:
    - wrong: 只画一条直线并把左边点写成 -2，没标原点和单位长度。
      why_wrong: 没有原点和单位长度，点与数无法建立确定对应。
      correct: 先标出原点、正方向和单位长度，再按方向与单位数定位。
    lesson_summary:
    - 数轴的三要素是原点、正方向和单位长度
    - 点的位置要用离原点几个单位和朝哪个方向来解释
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    note: 页码由 PDF outline inspection 补入
    page_range:
      start: 14
      end: 15
- id: skill-draft-kp-opposite-numbers
  target_knowledge_point_ids:
  - kp-opposite-numbers
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 理解相反数表示数轴上关于原点对称的两个数
    - 能求一个数的相反数
    prerequisites:
    - 数轴和有理数表示
    opening:
    - 从数轴上 +2 与 -2 到原点距离相同、方向相反导入
    diagnosis_questions:
    - 3 的相反数是什么？为什么？
    - 0 的相反数是什么？
    misconceptions:
    - 认为相反数一定是负数
    - 忘记 0 的相反数仍是 0
    correction_strategies:
    - 回到“只有符号不同”而不是“变成负数”
    - 用数轴对称位置解释 0
    practice_sequence:
    - 写出具体数的相反数
    - 从数轴读相反数
    - 判断两个数是否互为相反数
    mastery_checks:
    - 学生能说明相反数与原点对称的关系
    worked_examples:
    - prompt: 写出 3、-4、0 的相反数。
      steps:
      - 3 的相反数与 3 符号相反，是 -3
      - -4 的相反数与 -4 符号相反，是 4
      - 0 到原点距离为 0，仍与自己相反
      teacher_note: 重点纠正“相反数一定是负数”的机械说法。
    variant_problems:
    - 判断 2.5 和 -2.5 是否互为相反数
    - 说出数轴上与 -1 关于原点对称的点表示什么数
    error_contrasts:
    - wrong: -4 的相反数是 -4，因为它本来就是负数。
      why_wrong: 相反数看的是关于原点对称或符号相反，不是保留原符号。
      correct: -4 的相反数是 4，0 的相反数仍是 0。
    lesson_summary:
    - 只有符号不同的两个数互为相反数
    - 数轴上互为相反数的两个点关于原点对称
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    note: 页码由 PDF outline inspection 补入
    page_range:
      start: 16
      end: 17
- id: skill-draft-kp-absolute-value
  target_knowledge_point_ids:
  - kp-absolute-value
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 理解绝对值是数轴上点到原点的距离
    - 能用绝对值比较有理数大小
    prerequisites:
    - 数轴和相反数
    opening:
    - 从 -3 和 +3 到原点距离都为 3 导入
    diagnosis_questions:
    - '|-5| 为什么等于 5？'
    - -5 和 -2 哪个大？你能用数轴解释吗？
    misconceptions:
    - 把绝对值当作“去掉负号”的机械规则
    - 比较负数大小时只看数字大小
    correction_strategies:
    - 先说距离，再写符号结果
    - 用数轴位置判断大小
    practice_sequence:
    - 求绝对值
    - 比较两个负数
    - 解释绝对值相等的两个数
    mastery_checks:
    - 学生能用距离语言解释绝对值
    worked_examples:
    - prompt: 计算 |-5|，并比较 -5 和 -2 的大小。
      steps:
      - '|-5| 表示 -5 到原点的距离'
      - 距离是 5，所以 |-5| = 5
      - 在数轴上 -5 在 -2 左边，因此 -5 < -2
      teacher_note: 先用距离语言解释，再进入符号计算和大小比较。
    variant_problems:
    - 计算 |3|、|-3|，并说明为什么结果相同
    - 比较 -0.5 和 -2 的大小，并用数轴说明
    error_contrasts:
    - wrong: -5 比 -2 大，因为 5 比 2 大。
      why_wrong: 比较负数大小要看数轴位置，不能只比绝对值大小。
      correct: -5 在 -2 左边，所以 -5 < -2。
    lesson_summary:
    - 绝对值表示到原点的距离，因此结果不为负
    - 比较负数大小时，数轴上越靠右的数越大
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    note: 页码由 PDF outline inspection 补入
    page_range:
      start: 18
      end: 22
- id: skill-draft-kp-rational-add-subtract
  target_knowledge_point_ids:
  - kp-rational-add-subtract
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 掌握有理数加法的符号和绝对值处理
    - 理解减法可以转化为加上相反数
    prerequisites:
    - 绝对值和相反数
    opening:
    - 从收入支出或温度变化导入有理数加减
    diagnosis_questions:
    - (-3)+(+5) 的符号为什么是正？
    - 减去 -2 可以转化成什么？
    misconceptions:
    - 异号相加时符号乱选
    - 把减去负数仍写成减
    correction_strategies:
    - 先判断同号或异号，再处理绝对值
    - 把减法统一改写成加法再计算
    practice_sequence:
    - 同号加法
    - 异号加法
    - 减法转化
    - 混合加减
    mastery_checks:
    - 学生能说出每一步符号判断依据
    worked_examples:
    - prompt: 计算 (-3)+(+5)，再把 4-(-2) 改写成加法。
      steps:
      - (-3)+(+5) 是异号相加，先比较绝对值 5 和 3
      - 绝对值较大的数是 +5，所以结果为正，大小为 5-3=2
      - 4-(-2) 改写为 4+(+2)
      teacher_note: 每一步都要求学生先说符号来源，再做绝对值运算。
    variant_problems:
    - 计算 (-7)+(+2)，并说明结果符号
    - 把 -3-(+5) 改写成加法再计算
    error_contrasts:
    - wrong: 4-(-2)=4-2=2。
      why_wrong: 减去一个负数要转化为加上它的相反数。
      correct: 4-(-2)=4+(+2)=6。
    lesson_summary:
    - 有理数加法先分同号或异号，再处理绝对值
    - 有理数减法统一转化为加上相反数
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    note: 页码由 PDF outline inspection 补入
    page_range:
      start: 23
      end: 34
- id: skill-draft-kp-rational-multiply-divide
  target_knowledge_point_ids:
  - kp-rational-multiply-divide
  source_refs:
  - textbook-rj-math-grade7-vol1
  - llm-draft-teaching-design
  review_status: draft
  inferred_fields:
  - teaching_plan.opening
  - teaching_plan.misconceptions
  - teaching_plan.practice_sequence
  teaching_plan:
    learning_objectives:
    - 掌握有理数乘除法的符号法则
    - 能把除法转化为乘以倒数
    prerequisites:
    - 有理数加减、相反数和倒数
    opening:
    - 从正负因数个数与结果符号的关系导入
    diagnosis_questions:
    - 两个负数相乘为什么是正数？
    - 除以 -3 可以改写成乘以什么？
    misconceptions:
    - 多个负因数时符号判断混乱
    - 除法转乘法时忘记取倒数
    correction_strategies:
    - 先数负因数个数判断符号
    - 先改写除法，再约分或计算
    practice_sequence:
    - 两数乘法
    - 多因数乘法
    - 除法转化
    - 乘除混合
    mastery_checks:
    - 学生能在计算前先说明结果符号
    worked_examples:
    - prompt: 计算 (-2)×(-3)×4，并把 6÷(-3) 改写成乘法。
      steps:
      - (-2)×(-3)×4 中有两个负因数，负因数个数为偶数
      - 结果符号为正，绝对值为 2×3×4=24
      - 6÷(-3) 改写为 6×(-1/3)
      teacher_note: 乘除混合先改写成乘法串，再判断负因数个数。
    variant_problems:
    - 判断 (-1)×(-2)×(-3) 的结果符号
    - 把 (-8)÷(+4) 改写成乘法并计算
    error_contrasts:
    - wrong: 6÷(-3)=6×3。
      why_wrong: 除法转乘法时要乘以除数的倒数，符号也不能丢。
      correct: 6÷(-3)=6×(-1/3)=-2。
    lesson_summary:
    - 乘除法先判断符号，再算绝对值
    - 除以一个非零数等于乘以这个数的倒数
  evidence:
  - source_ref: textbook-rj-math-grade7-vol1
    note: 页码由 PDF outline inspection 补入
    page_range:
      start: 35
      end: 47
